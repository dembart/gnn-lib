data:
  train: data/MatPES-PBE-2025.1.train.xyz
  val: data/MatPES-PBE-2025.1.valid.xyz
  test: data/MatPES-PBE-2025.1.test.xyz
  energy_key: energy_per_atom_matpes_pbe
  forces_key: forces_matpes_pbe
  stress_key: stress_matpes_pbe
  stress_units: kbar # can be kbar, GPa, eV_per_A3
  r_cut: 5.0
  n_max_neighbors: false
  processed_data_path: processed_data_matpes_pbe_small
  use_lmdb: false
  normalize_energy: false
training:
  train_batch_size: 512
  val_batch_size: 2048
  num_epochs: 1000
  optimizer:
    type: Adam
    params:
      lr: 0.005
      weight_decay: 0.0
  scheduler:
    type: ReduceLROnPlateau
    params:
      factor: 0.5
      patience: 30
loss:
  type: EFSLoss
  params:
    energy_weight: 1.0
    forces_weight: 2.0
    stress_weight: 0.01
logging:
  log_dir: logs_matpes_pbe_small
  checkpoint_dir: checkpoints_matpes_pbe_small
  checkpoint_freq: 50
  metric: val_total_loss
  use_wandb: false
  run_name: test_run
  wandb_entity: my_entity
  wandb_project: my_project
